apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 483692969455.dkr.ecr.us-east-1.amazonaws.com/order-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://ecommerce-db.cs9c6ck2kjv1.us-east-1.rds.amazonaws.com:5432/ecommerce"
            - name: SPRING_DATASOURCE_USERNAME
              value: "dbadmin"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "admin123"
            - name: AWS_SQS_REGION
              value: "us-east-1"
            - name: AWS_SQS_ORDERS_QUEUE_URL
              value: "https://sqs.us-east-1.amazonaws.com/483692969455/orders-queue"
            - name: AWS_SQS_LAMBDA_ORDERS_QUEUE_URL
              value: "https://sqs.us-east-1.amazonaws.com/483692969455/lambda-orders-queue"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
